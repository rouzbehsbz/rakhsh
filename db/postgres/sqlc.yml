version: "2"

sql:
  - engine: "postgresql"
    queries:
      - "./queries/clients.sql"
      - "./queries/messages.sql"

    schema:
      - "./schemas/clients.sql"
      - "./schemas/messages.sql"

    gen:
      go:
        package: "postgresDb"
        out: "./gen"
        sql_package: "pgx/v5"